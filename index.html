<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Programme Radio Judaica</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: transparent;
      font-family: Arial, sans-serif;
      color: #264d81;
    }

    .wrap {
      background: #f4f8fc;
      border: 1px solid #d9e3f2;
      border-radius: 12px;
      padding: 16px;
      box-sizing: border-box;
    }

    .top {
      margin-bottom: 12px;
    }

    .title-main {
      font-size: 20px;
      font-weight: 700;
      line-height: 1.2;
      margin-bottom: 4px;
    }

    .sub {
      font-size: 13px;
      color: #5d78a3;
      line-height: 1.45;
    }

    .card {
      background: #ffffff;
      border: 1px solid #d9e3f2;
      border-radius: 10px;
      padding: 12px;
      margin-bottom: 10px;
    }

    .label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: #5d78a3;
      margin-bottom: 8px;
    }

    .row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 6px;
    }

    .title {
      font-size: 16px;
      font-weight: 700;
      line-height: 1.25;
      color: #264d81;
    }

    .meta {
      font-size: 13px;
      line-height: 1.45;
      color: #5d78a3;
    }

    .badge {
      display: inline-block;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      border-radius: 999px;
      padding: 5px 9px;
      white-space: nowrap;
    }

    .badge-audio {
      background: #eef3fa;
      color: #264d81;
      border: 1px solid #d9e3f2;
    }

    .badge-video {
      background: #264d81;
      color: #ffffff;
      border: 1px solid #264d81;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 14px;
    }

    .btn {
      display: inline-block;
      text-decoration: none;
      font-weight: 700;
      font-size: 14px;
      padding: 10px 16px;
      border-radius: 999px;
    }

    .btn-primary {
      background: #264d81;
      color: #ffffff;
    }

    .btn-secondary {
      background: #ffffff;
      color: #264d81;
      border: 1px solid #c8d7eb;
    }

    .foot {
      margin-top: 10px;
      font-size: 11px;
      color: #7b93b8;
    }

    .error {
      background: #fff;
      border: 1px solid #f0c9c9;
      border-radius: 10px;
      padding: 14px;
      font-size: 14px;
      color: #264d81;
    }

    @media (max-width: 480px) {
      .title-main { font-size: 18px; }
      .title { font-size: 15px; }
      .btn { width: 100%; text-align: center; box-sizing: border-box; }
    }
  </style>
</head>
<body>
  <div id="app" class="wrap">
    <div class="error">Chargement...</div>
  </div>

<script>
  var programmeTimeout = null;

  function esc(str) {
    return String(str || '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function badge(format) {
    var f = String(format || '').toLowerCase().trim();
    if (f === 'audio') return '<span class="badge badge-audio">Audio</span>';
    if (f === 'video' || f === 'vidéo') return '<span class="badge badge-video">Vidéo</span>';
    return '';
  }

  function renderCard(label, show) {
    var metaParts = [];
    if (show.dayLabel) metaParts.push(show.dayLabel);
    if (show.timeLabel) metaParts.push(show.timeLabel);
    if (show.host) metaParts.push(show.host);

    return (
      '<div class="card">' +
        '<div class="label">' + esc(label) + '</div>' +
        '<div class="row">' +
          '<div class="title">' + esc(show.title) + '</div>' +
          badge(show.format) +
        '</div>' +
        '<div class="meta">' + esc(metaParts.join(' • ')) + '</div>' +
      '</div>'
    );
  }

  function showFallback(message) {
    var app = document.getElementById('app');
    if (!app) return;

    app.innerHTML =
      '<div class="top">' +
        '<div class="title-main">Programme</div>' +
        '<div class="sub">Accès simplifié aux émissions Radio Judaica.</div>' +
      '</div>' +
      '<div class="card">' +
        '<div class="label">Information</div>' +
        '<div class="title">Programme temporairement indisponible</div>' +
        '<div class="meta">' + esc(message || 'Veuillez consulter la grille complète.') + '</div>' +
      '</div>' +
      '<div class="actions">' +
        '<a class="btn btn-primary" href="https://www.twitch.tv/radiojudaica" target="_blank">Voir le live</a>' +
        '<a class="btn btn-secondary" href="https://radiojudaica.be/page/programmes-de-radio-judaica-24" target="_blank">Voir la grille</a>' +
      '</div>';
  }

  function renderProgramme(data) {
    if (programmeTimeout) {
      clearTimeout(programmeTimeout);
      programmeTimeout = null;
    }

    var app = document.getElementById('app');
    if (!app) return;

    if (!data || !data.ok) {
      showFallback('Impossible de charger le programme pour le moment.');
      return;
    }

    var currentCard = data.currentShow
      ? renderCard('En ce moment', data.currentShow)
      : (
        '<div class="card">' +
          '<div class="label">En ce moment</div>' +
          '<div class="title">Pas de direct en ce moment</div>' +
          '<div class="meta">Consultez les prochaines émissions ci-dessous.</div>' +
        '</div>'
      );

    var nextCards = '';
    (data.nextShows || []).forEach(function(show, index) {
      nextCards += renderCard(index === 0 ? 'Prochaine émission' : 'Ensuite', show);
    });

    app.innerHTML =
      '<div class="top">' +
        '<div class="title-main">À suivre</div>' +
        '<div class="sub">Le programme du direct, mis à jour automatiquement.</div>' +
      '</div>' +
      currentCard +
      nextCards +
      '<div class="actions">' +
        '<a class="btn btn-primary" href="' + esc(data.liveUrl) + '" target="_blank">Voir le live</a>' +
        '<a class="btn btn-secondary" href="' + esc(data.gridUrl) + '" target="_blank">Voir la grille</a>' +
      '</div>' +
      '<div class="foot">Mise à jour : ' + esc(data.updatedAt) + '</div>';
  }

  function loadProgramme() {
    var old = document.getElementById('programme-data');
    if (old) old.remove();

    if (programmeTimeout) {
      clearTimeout(programmeTimeout);
    }

    programmeTimeout = setTimeout(function() {
      showFallback('Le chargement prend trop de temps sur cet appareil. Vous pouvez consulter directement la grille complète.');
    }, 4000);

    var s = document.createElement('script');
    s.id = 'programme-data';
    s.src = 'https://script.google.com/macros/s/AKfycbx4hQikLGLeMu1lunVhA7Eg9RDz-KKJCO91M8qggicBMsxqNqTmowjd3t393g_9IHRx/exec?prefix=renderProgramme&_=' + Date.now();
    s.async = true;
    s.onerror = function() {
      if (programmeTimeout) {
        clearTimeout(programmeTimeout);
        programmeTimeout = null;
      }
      showFallback('Le programme automatique n’est pas disponible sur cet appareil pour le moment.');
    };

    document.body.appendChild(s);
  }

  loadProgramme();
  setInterval(loadProgramme, 60000);
</script>
</body>
</html>
